# IonCore Configuration

# Database Configuration (PostgreSQL)
# REQUIRED: Must be configured for the plugin to start.
database:
  jdbc-url: "jdbc:postgresql://localhost:5432/runemind_db"
  username: "runemind_admin"
  password: "password"
  pool-settings:
    maximum-pool-size: 5
    connection-timeout: 5000 # 5 seconds

# Networking Mode: 'server', 'client', or 'disabled'
# Temporarily set to 'disabled' for Phase 0 migration.
mode: "disabled"

